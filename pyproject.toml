[tool.black]
line-length = 88
target-version = ['py312']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | __pycache__
  | migrations/versions
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip = [".venv", "venv", "__pycache__", "migrations/versions"]
known_first_party = ["src"]
